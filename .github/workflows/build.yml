name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: medcare-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  build-release-aab:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check secrets
        shell: bash
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Required secrets are missing."
            exit 1
          fi

      - name: Decode Keystore
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | tr -d '\r\n ' | base64 --decode > app/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

    - name: Build Release AAB
  run: ./gradlew bundleRelease
  env:
    SIGNING_STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
    SIGNING_KEY_ALIAS: ${{ env.KEY_ALIAS }}
    SIGNING_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: medcare-release-aab
          path: app/build/outputs/bundle/release/*.aab
